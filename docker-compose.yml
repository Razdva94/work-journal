services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    ports:
      - '127.0.0.1:5433:5432'
    volumes:
      - work_journal_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d work_journal']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL}
        DATABASE_URL: ${DATABASE_URL}
    restart: unless-stopped
    env_file: .env
    ports:
      - '127.0.0.1:3001:3001'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  work_journal_pg:
